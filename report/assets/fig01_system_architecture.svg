<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3b4a6b"/>
    </marker>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #1f2a44; }
      .subtitle { font: 600 16px Arial, sans-serif; fill: #38507a; }
      .boxTitle { font: 700 20px Arial, sans-serif; fill: #1b2842; }
      .boxText { font: 15px Arial, sans-serif; fill: #23314f; }
      .small { font: 14px Arial, sans-serif; fill: #3d4b66; }
      .layer { stroke: #51617f; stroke-width: 2; rx: 22; ry: 22; }
      .arrow { stroke: #3b4a6b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>
  <text x="600" y="46" text-anchor="middle" class="title">Gesture-Driven Intelligent Motion Control Architecture</text>
  <text x="600" y="74" text-anchor="middle" class="subtitle">Industrial robot motion control built from perception, AI inference, planning, control, and safety</text>

  <rect x="70" y="110" width="1060" height="95" fill="#dff3ff" class="layer"/>
  <text x="100" y="145" class="boxTitle">1. Human and Environment Layer</text>
  <text x="100" y="172" class="boxText">Operator gestures, workspace objects, fixtures, collaborators, process context</text>
  <text x="100" y="194" class="small">Examples: point, pinch, open-palm stop, wrist rotation, body proximity</text>

  <rect x="70" y="235" width="1060" height="120" fill="#e8f8ea" class="layer"/>
  <text x="100" y="270" class="boxTitle">2. Perception Layer</text>
  <text x="100" y="297" class="boxText">RGB camera, depth camera, force/torque sensor, joint encoder, optional IMU</text>
  <text x="100" y="319" class="small">Outputs: hand landmarks, 3D pose, target region, external force, human distance</text>
  <rect x="790" y="258" width="290" height="72" rx="14" ry="14" fill="#ffffff" stroke="#95b79b" stroke-width="2"/>
  <text x="815" y="285" class="boxText">Sensor fusion</text>
  <text x="815" y="309" class="small">Temporal filtering + confidence estimation</text>

  <rect x="70" y="385" width="1060" height="120" fill="#fff1d6" class="layer"/>
  <text x="100" y="420" class="boxTitle">3. Intent Understanding Layer</text>
  <text x="100" y="447" class="boxText">Gesture classification, pointing interpretation, task-mode recognition</text>
  <text x="100" y="469" class="small">AI model maps human body-sensing data into symbolic and continuous motion commands</text>
  <rect x="730" y="405" width="350" height="78" rx="14" ry="14" fill="#fff9ee" stroke="#caa964" stroke-width="2"/>
  <text x="755" y="432" class="boxText">Intent outputs</text>
  <text x="755" y="456" class="small">pickup, align, rotate, slow-down, stop, confirm</text>

  <rect x="70" y="535" width="690" height="140" fill="#efe5ff" class="layer"/>
  <text x="100" y="570" class="boxTitle">4. Motion Intelligence Layer</text>
  <text x="100" y="597" class="boxText">Trajectory generation, inverse kinematics, collision checking, singularity avoidance</text>
  <text x="100" y="619" class="small">Adaptive speed profile + null-space posture optimization + task-space constraints</text>
  <rect x="96" y="635" width="300" height="28" rx="10" ry="10" fill="#ffffff" stroke="#a58ccf" stroke-width="2"/>
  <text x="115" y="654" class="small">Output: feasible Cartesian/joint references</text>

  <rect x="790" y="535" width="340" height="140" fill="#ffe4e8" class="layer"/>
  <text x="820" y="570" class="boxTitle">5. Safety Supervision</text>
  <text x="820" y="597" class="boxText">Speed and separation monitoring, zone logic, safe stop, confidence gating</text>
  <text x="820" y="619" class="small">Independent safety limits prevent unsafe AI commands reaching actuators</text>
  <rect x="822" y="635" width="270" height="28" rx="10" ry="10" fill="#ffffff" stroke="#cf7c88" stroke-width="2"/>
  <text x="840" y="654" class="small">Output: speed cap / compliant mode / stop</text>

  <rect x="70" y="700" width="1060" height="36" fill="#dde3f1" rx="18" ry="18" stroke="#51617f" stroke-width="2"/>
  <text x="600" y="724" text-anchor="middle" class="boxText">6. Robot Execution Layer: servo loop, torque control, impedance control, motion logging</text>

  <path d="M600 205 L600 233" class="arrow"/>
  <path d="M600 355 L600 383" class="arrow"/>
  <path d="M420 505 L420 533" class="arrow"/>
  <path d="M960 505 L960 533" class="arrow"/>
  <path d="M420 675 L420 698" class="arrow"/>
  <path d="M960 675 L960 698" class="arrow"/>

  <path d="M760 605 C780 605, 780 605, 790 605" class="arrow"/>
  <path d="M790 635 C740 680, 690 690, 600 690" stroke="#a94f5c" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>

  <text x="78" y="746" class="small">Key idea: AI interprets intention; classical control guarantees smooth, accurate, and stable motion.</text>
</svg>
