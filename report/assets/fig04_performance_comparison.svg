<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <style>
    .title { font: 700 28px Arial, sans-serif; fill: #1f2a44; }
    .subtitle { font: 600 16px Arial, sans-serif; fill: #49638c; }
    .axis { stroke: #50607f; stroke-width: 2; }
    .grid { stroke: #d8e0ef; stroke-width: 1; }
    .label { font: 15px Arial, sans-serif; fill: #243251; }
    .legend { font: 15px Arial, sans-serif; fill: #2d3d5d; }
    .value { font: 700 14px Arial, sans-serif; fill: #14213d; }
  </style>

  <rect width="1200" height="720" fill="#f8fbff"/>
  <text x="600" y="48" text-anchor="middle" class="title">Performance Comparison in High-Mix Industrial Operation</text>
  <text x="600" y="76" text-anchor="middle" class="subtitle">Conventional teach pendant versus intelligent gesture-driven motion control</text>

  <line x1="140" y1="600" x2="1040" y2="600" class="axis"/>
  <line x1="140" y1="160" x2="140" y2="600" class="axis"/>
  <line x1="140" y1="520" x2="1040" y2="520" class="grid"/>
  <line x1="140" y1="440" x2="1040" y2="440" class="grid"/>
  <line x1="140" y1="360" x2="1040" y2="360" class="grid"/>
  <line x1="140" y1="280" x2="1040" y2="280" class="grid"/>
  <line x1="140" y1="200" x2="1040" y2="200" class="grid"/>

  <text x="110" y="605" class="label">0</text>
  <text x="100" y="525" class="label">20</text>
  <text x="100" y="445" class="label">40</text>
  <text x="100" y="365" class="label">60</text>
  <text x="100" y="285" class="label">80</text>
  <text x="92" y="205" class="label">100</text>
  <text x="58" y="185" transform="rotate(-90 58,185)" class="label">Relative score / 100</text>

  <rect x="165" y="120" width="250" height="24" fill="#7cb5ff"/>
  <text x="430" y="138" class="legend">Conventional teach pendant</text>
  <rect x="700" y="120" width="250" height="24" fill="#7ad7b0"/>
  <text x="965" y="138" class="legend">Intelligent gesture control</text>

  <g>
    <rect x="190" y="296" width="70" height="304" fill="#7cb5ff"/>
    <rect x="270" y="184" width="70" height="416" fill="#7ad7b0"/>
    <text x="225" y="286" text-anchor="middle" class="value">62</text>
    <text x="305" y="174" text-anchor="middle" class="value">88</text>
    <text x="265" y="630" text-anchor="middle" class="label">Setup speed</text>
  </g>

  <g>
    <rect x="390" y="260" width="70" height="340" fill="#7cb5ff"/>
    <rect x="470" y="172" width="70" height="428" fill="#7ad7b0"/>
    <text x="425" y="250" text-anchor="middle" class="value">68</text>
    <text x="505" y="162" text-anchor="middle" class="value">91</text>
    <text x="465" y="630" text-anchor="middle" class="label">Flexibility</text>
  </g>

  <g>
    <rect x="590" y="208" width="70" height="392" fill="#7cb5ff"/>
    <rect x="670" y="232" width="70" height="368" fill="#7ad7b0"/>
    <text x="625" y="198" text-anchor="middle" class="value">78</text>
    <text x="705" y="222" text-anchor="middle" class="value">74</text>
    <text x="665" y="630" text-anchor="middle" class="label">Repeatability</text>
  </g>

  <g>
    <rect x="790" y="248" width="70" height="352" fill="#7cb5ff"/>
    <rect x="870" y="180" width="70" height="420" fill="#7ad7b0"/>
    <text x="825" y="238" text-anchor="middle" class="value">70</text>
    <text x="905" y="170" text-anchor="middle" class="value">89</text>
    <text x="865" y="630" text-anchor="middle" class="label">Usability</text>
  </g>

  <g>
    <rect x="990" y="272" width="70" height="328" fill="#7cb5ff"/>
    <rect x="1070" y="204" width="70" height="396" fill="#7ad7b0"/>
    <text x="1025" y="262" text-anchor="middle" class="value">66</text>
    <text x="1105" y="194" text-anchor="middle" class="value">82</text>
    <text x="1065" y="630" text-anchor="middle" class="label">Safety awareness</text>
  </g>

  <rect x="150" y="660" width="900" height="34" rx="16" ry="16" fill="#eef4ff" stroke="#90a4c6" stroke-width="2"/>
  <text x="600" y="682" text-anchor="middle" class="legend">Gesture control especially improves setup speed, flexibility, and operator understanding in collaborative workflows.</text>
</svg>
